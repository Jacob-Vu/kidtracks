name: kidstrack_mobile
description: Flutter mobile client for the KidsTrack family task and reward app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cloud_firestore: ^5.6.1
  cloud_functions: ^5.2.1
  firebase_auth: ^5.3.4
  firebase_core: ^3.9.0
  go_router: ^14.6.2
  google_sign_in: ^6.2.2
  flutter_riverpod: ^2.6.1
  intl: ^0.20.2
  shared_preferences: ^2.3.3
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
